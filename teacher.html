<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; /* Deep Midnight Navy */
            --sidebar: #0f172a; /* Slate Navy */
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(148, 163, 184, 0.1);
            --accent: #0ea5e9; /* Electric Cyan */
            --accent-glow: rgba(14, 165, 233, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--glass-border);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
            color: white;
            font-weight: 900;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 0.15em;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .qr-container {
            background: white;
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #qrImage { width: 160px; height: 160px; }

        button {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }

        .btn-primary { background: var(--accent); color: white; border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }
        
        .btn-glass { background: rgba(255,255,255,0.05); color: white; }
        .btn-glass:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        /* Main Content */
        .main {
            margin-left: 280px;
            padding: 3rem;
            flex-grow: 1;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1.5rem 2.5rem;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .stat-label { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 3.5rem; font-weight: 800; margin-top: 0.5rem; color: var(--accent); text-shadow: 0 0 20px rgba(14, 165, 233, 0.3); }

        .date-input-container {
            background: var(--sidebar);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.2rem;
            border-radius: 14px;
        }

        /* Table */
        .table-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 1.2rem 1.5rem; 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.03);
        }
        td { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--glass-border); font-size: 0.95rem; }
        tr:hover { background: rgba(14, 165, 233, 0.05); }

        .time-cell { color: var(--accent); font-weight: 800; font-family: 'Courier New', monospace; }
        .index-cell { color: var(--text-muted); font-family: monospace; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">A</div>
            Attendance Pro
        </div>
        
        <div class="nav-label">Class Settings</div>
        <input type="text" id="classIdInput" value="cs101" onchange="refresh()">

        <div class="nav-label">QR Access Point</div>
        <div class="qr-container">
            <img id="qrImage" src="" alt="QR Code">
        </div>

        <button class="btn-glass" onclick="updateLoc()">📍 Update Room GPS</button>
        
        <div style="margin-top: auto;">
            <button class="btn-primary" onclick="downloadExcel()">📥 Download CSV</button>
            <button class="btn-glass" onclick="copyTable()">📋 Copy for Excel</button>
        </div>
    </aside>

    <main class="main">
        <div class="header-section">
            <div>
                <div class="live-badge"><span class="dot"></span> System Live</div>
                <h2 style="margin: 10px 0 0; font-size: 2rem; letter-spacing: -0.03em;">Attendance Overview</h2>
            </div>
            <div class="date-input-container">
                <input type="date" id="viewDate" onchange="refresh()" style="margin:0; border:none; background:transparent; font-weight:700; cursor:pointer;">
            </div>
        </div>

        <div class="header-section" style="justify-content: flex-start;">
            <div class="stat-card">
                <div class="stat-label">Students Present</div>
                <div class="stat-value" id="count">0</div>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Student Name</th>
                        <th>Index Number</th>
                    </tr>
                </thead>
                <tbody id="list">
                    <!-- Data -->
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('viewDate').value = new Date().toISOString().split('T')[0];

        window.refresh = () => {
            const cid = document.getElementById('classIdInput').value;
            const url = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}`;
            load(cid);
        };

        let unsub = null;
        function load(cid) {
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "attendance"), where("classId", "==", cid)), (snap) => {
                const selectedDate = document.getElementById('viewDate').value;
                const filtered = snap.docs.map(d => d.data()).filter(d => {
                    if(!d.timestamp) return false;
                    return d.timestamp.toDate().toISOString().split('T')[0] === selectedDate;
                }).sort((a,b) => b.timestamp - a.timestamp);

                document.getElementById('count').innerText = filtered.length;
                document.getElementById('list').innerHTML = filtered.map(d => {
                    const time = d.timestamp.toDate().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    return `<tr>
                        <td class="time-cell">${time}</td>
                        <td style="font-weight:600;">${d.student}</td>
                        <td><span class="index-cell">${d.index}</span></td>
                    </tr>`;
                }).join('') || "<tr><td colspan='3' style='text-align:center; padding: 5rem; color: var(--text-muted);'>No records found for this date.</td></tr>";
            });
        }

        window.downloadExcel = () => {
            let csv = "\ufeffTime,Name,Index\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                if (tr.cells.length >= 3) {
                    csv += `${tr.cells[0].innerText},${tr.cells[1].innerText.replace(/,/g, "")},${tr.cells[2].innerText}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", "attendance_report.csv");
            document.body.appendChild(link);
            link.click();
        };

        window.copyTable = () => {
            let text = "Time\tName\tIndex\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                if (tr.cells.length >= 3) {
                    text += `${tr.cells[0].innerText}\t${tr.cells[1].innerText}\t${tr.cells[2].innerText}\n`;
                }
            });
            navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
        };

        window.updateLoc = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await updateDoc(doc(db, "classes", document.getElementById('classIdInput').value), { lat: pos.coords.latitude, lng: pos.coords.longitude });
                alert("Room GPS Updated Successfully!");
            });
        };

        refresh();
    </script>
</body>
</html>

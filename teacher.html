<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <!-- Library to generate QR Codes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #1a73e8; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; justify-content: center; }
        
        /* Left Side: Controls */
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 300px; }
        #qrcode { margin: 20px auto; padding: 10px; background: white; border: 1px solid #ddd; width: 180px; height: 180px; }
        
        /* Right Side: Table */
        .list-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex-grow: 1; min-width: 350px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; }
        
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1557b0; }
        .loc-btn { background: #34a853; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .stats { font-size: 24px; font-weight: bold; color: #1a73e8; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Teacher Attendance Dashboard</h1>
</header>

<div class="container">
    <!-- Sidebar -->
    <div class="panel">
        <h3>Class Control</h3>
        <label>Class ID:</label>
        <input type="text" id="classIdInput" value="cs101">
        <button onclick="generateNewQR()">Update QR Code</button>
        
        <div id="qrcode"></div>
        <p style="font-size: 12px; color: #666; text-align: center;">Scan to mark present</p>
        
        <hr>
        <h3>Location Control</h3>
        <button class="loc-btn" onclick="updateClassLocation()">Set Class Location Here</button>
        <p id="locStatus" style="font-size: 11px; color: #666; margin-top: 5px;"></p>
    </div>

    <!-- Attendance List -->
    <div class="list-container">
        <div class="stats">Present: <span id="count">0</span></div>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Name</th>
                    <th>Index</th>
                </tr>
            </thead>
            <tbody id="attendanceList">
                <tr><td colspan="3">Loading attendance...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
        authDomain: "qr-code-attendace.firebaseapp.com",
        projectId: "qr-code-attendace",
        storageBucket: "qr-code-attendace.firebasestorage.app",
        messagingSenderId: "346712215800",
        appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let qrcode = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });

    // 1. Function to generate the QR code
    window.generateNewQR = () => {
        const classId = document.getElementById('classIdInput').value;
        const studentUrl = `https://ygideon75-cpu.github.io/attendance-system/?class=${classId}`;
        qrcode.makeCode(studentUrl);
        startListening(classId);
    };

    // 2. Function to listen for student check-ins
    let unsubscribe = null;
    function startListening(classId) {
        if (unsubscribe) unsubscribe(); // Stop listening to old class if changed

        const q = query(
            collection(db, "attendance"), 
            where("classId", "==", classId),
            orderBy("timestamp", "desc")
        );

        unsubscribe = onSnapshot(q, (snapshot) => {
            const list = document.getElementById('attendanceList');
            document.getElementById('count').innerText = snapshot.size;
            list.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const d = doc.data();
                const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : "...";
                list.innerHTML += `<tr>
                    <td>${time}</td>
                    <td>${d.student}</td>
                    <td>${d.index}</td>
                </tr>`;
            });
        }, (err) => {
            console.error(err);
            if(err.message.includes("index")) {
                alert("Firebase needs an index. Check the browser console (F12) for the link to fix this.");
            }
        });
    }

    // 3. Function to update class location to where the teacher is currently standing
    window.updateClassLocation = () => {
        const classId = document.getElementById('classIdInput').value;
        document.getElementById('locStatus').innerText = "Getting GPS...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            try {
                await updateDoc(doc(db, "classes", classId), {
                    lat: lat,
                    lng: lng,
                    radius: 100 // Default 100 meters
                });
                document.getElementById('locStatus').innerText = "Location Updated Successfully!";
                document.getElementById('locStatus').style.color = "green";
            } catch (e) {
                alert("Error: " + e.message);
            }
        });
    };

    // Start with default class
    generateNewQR();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; display: flex; }
        .sidebar { width: 250px; background: white; height: 100vh; padding: 20px; border-right: 1px solid #ddd; position: fixed; }
        .main { margin-left: 290px; padding: 20px; flex-grow: 1; }
        .qr-box { text-align: center; margin: 20px 0; padding: 10px; border: 1px solid #ddd; }
        #qrImage { width: 150px; height: 150px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #eee; }
        button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
        .btn-excel { background: #28a745; color: white; font-weight: bold; margin-top: 20px; }
        .stats { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Controls</h3>
        <label>Class ID:</label>
        <input type="text" id="classIdInput" value="cs101" onchange="refresh()">
        <div class="qr-box">
            <img id="qrImage" src="">
        </div>
        <button onclick="updateLoc()">Update Location</button>
        <button class="btn-excel" onclick="download()">📊 Download to Excel</button>
    </div>

    <div class="main">
        <div class="stats">Total: <span id="count">0</span></div>
        <input type="date" id="viewDate" onchange="refresh()">
        <table>
            <thead>
                <tr><th>Time</th><th>Name</th><th>Index</th></tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        document.getElementById('viewDate').value = new Date().toISOString().split('T')[0];

        window.refresh = () => {
            const cid = document.getElementById('classIdInput').value;
            const url = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}`;
            load(cid);
        };

        let unsub = null;
        function load(cid) {
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "attendance"), where("classId", "==", cid)), (snap) => {
                const date = document.getElementById('viewDate').value;
                const filtered = snap.docs.map(d => d.data()).filter(d => {
                    if(!d.timestamp) return false;
                    return d.timestamp.toDate().toISOString().split('T')[0] === date;
                }).sort((a,b) => b.timestamp - a.timestamp);
                document.getElementById('count').innerText = filtered.length;
                document.getElementById('list').innerHTML = filtered.map(d => `<tr><td>${d.timestamp.toDate().toLocaleTimeString()}</td><td>${d.student}</td><td>${d.index}</td></tr>`).join('');
            });
        }

        window.download = () => {
            let csv = "Time,Name,Index\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                csv += Array.from(tr.cells).map(td => td.innerText.replace(/,/g, "")).join(",") + "\n";
            });
            
            // This is the original method that triggers Excel immediately
            const link = document.createElement("a");
            link.setAttribute("href", "data:text/csv;charset=utf-8,\ufeff" + encodeURIComponent(csv));
            link.setAttribute("download", "attendance.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.updateLoc = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await updateDoc(doc(db, "classes", document.getElementById('classIdInput').value), { lat: pos.coords.latitude, lng: pos.coords.longitude });
                alert("Location Updated!");
            });
        };
        refresh();
    </script>
</body>
</html>

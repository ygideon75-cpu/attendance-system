<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--glass-border);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }

        .logo span {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .qr-container {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        #qrImage { width: 160px; height: 160px; }

        button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }

        .btn-primary { background: var(--accent); color: white; border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }
        
        .btn-glass { background: var(--glass); color: white; }
        .btn-glass:hover { background: rgba(255,255,255,0.1); }

        /* Main Content */
        .main {
            margin-left: 280px;
            padding: 3rem;
            flex-grow: 1;
            max-width: 1200px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1.5rem 2rem;
            border-radius: 24px;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .stat-label { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; }
        .stat-value { font-size: 3rem; font-weight: 800; margin-top: 0.5rem; color: var(--text-main); }

        .date-picker-wrapper {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 12px;
        }

        /* Table */
        .table-wrapper {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 1.2rem 1.5rem; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.02);
        }
        td { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--glass-border); font-size: 0.95rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .time-tag { color: var(--accent); font-weight: 700; font-family: monospace; }
        .index-tag { color: var(--text-muted); font-family: monospace; font-size: 0.85rem; }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><span>✓</span> Attendance Pro</div>
        
        <div class="nav-label">Class Configuration</div>
        <input type="text" id="classIdInput" value="cs101" onchange="refresh()">

        <div class="nav-label">Student Access</div>
        <div class="qr-container">
            <img id="qrImage" src="" alt="QR Code">
        </div>

        <button class="btn-glass" onclick="updateLoc()">📍 Update Location</button>
        
        <div style="margin-top: auto;">
            <button class="btn-primary" onclick="downloadExcel()">📥 Export CSV</button>
            <button class="btn-glass" onclick="copyTable()">📋 Copy to Clipboard</button>
        </div>
    </aside>

    <main class="main">
        <div class="header-row">
            <div>
                <h2 style="margin:0; font-size: 1.8rem;">Session Overview</h2>
                <p style="color: var(--text-muted); margin: 5px 0 0;"><span class="live-dot"></span> Live tracking enabled</p>
            </div>
            <div class="date-picker-wrapper">
                <input type="date" id="viewDate" onchange="refresh()" style="margin:0; border:none; background:transparent; font-weight:700;">
            </div>
        </div>

        <div class="header-row" style="justify-content: flex-start; gap: 2rem;">
            <div class="stat-card">
                <div class="stat-label">Total Attendees</div>
                <div class="stat-value" id="count">0</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Student Name</th>
                        <th>Index Number</th>
                    </tr>
                </thead>
                <tbody id="list">
                    <!-- Data -->
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('viewDate').value = new Date().toISOString().split('T')[0];

        window.refresh = () => {
            const cid = document.getElementById('classIdInput').value;
            const url = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}`;
            load(cid);
        };

        let unsub = null;
        function load(cid) {
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "attendance"), where("classId", "==", cid)), (snap) => {
                const selectedDate = document.getElementById('viewDate').value;
                const filtered = snap.docs.map(d => d.data()).filter(d => {
                    if(!d.timestamp) return false;
                    return d.timestamp.toDate().toISOString().split('T')[0] === selectedDate;
                }).sort((a,b) => b.timestamp - a.timestamp);

                document.getElementById('count').innerText = filtered.length;
                document.getElementById('list').innerHTML = filtered.map(d => {
                    const time = d.timestamp.toDate().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    return `<tr>
                        <td class="time-tag">${time}</td>
                        <td style="font-weight:600;">${d.student}</td>
                        <td class="index-tag">${d.index}</td>
                    </tr>`;
                }).join('') || "<tr><td colspan='3' style='text-align:center; padding: 4rem; color: var(--text-muted);'>No records found.</td></tr>";
            });
        }

        window.downloadExcel = () => {
            let csv = "\ufeffTime,Name,Index\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                if (tr.cells.length >= 3) {
                    csv += `${tr.cells[0].innerText},${tr.cells[1].innerText.replace(/,/g, "")},${tr.cells[2].innerText}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", "attendance_report.csv");
            document.body.appendChild(link);
            link.click();
        };

        window.copyTable = () => {
            let text = "Time\tName\tIndex\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                if (tr.cells.length >= 3) {
                    text += `${tr.cells[0].innerText}\t${tr.cells[1].innerText}\t${tr.cells[2].innerText}\n`;
                }
            });
            navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
        };

        window.updateLoc = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await updateDoc(doc(db, "classes", document.getElementById('classIdInput').value), { lat: pos.coords.latitude, lng: pos.coords.longitude });
                alert("Room GPS Updated!");
            });
        };

        refresh();
    </script>
</body>
</html>

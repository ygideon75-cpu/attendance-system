<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semester Attendance Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #1a73e8; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 300px; }
        .list-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex-grow: 1; }
        
        /* Filter Section */
        .filter-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        
        #qrcode { margin: 20px auto; padding: 10px; background: white; border: 1px solid #ddd; width: 180px; height: 180px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        
        button { background: #1a73e8; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .download-btn { background: #34a853; width: 100%; margin-top: 20px; padding: 15px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<header>
    <h1>Semester Attendance Dashboard</h1>
    <div id="liveStatus">Connected to Firebase</div>
</header>

<div class="container">
    <!-- Left Sidebar -->
    <div class="panel">
        <h3>QR Code</h3>
        <input type="text" id="classIdInput" value="cs101" onchange="generateQR()">
        <div id="qrcode"></div>
        <p style="font-size: 11px; text-align: center;">Scan to mark attendance</p>
        
        <hr>
        <button style="background:#6c757d; width: 100%;" onclick="updateLocation()">Update Class Location</button>
        <button class="download-btn" onclick="downloadSheet()">📊 Download Filtered List</button>
    </div>

    <!-- Main Content -->
    <div class="list-container">
        <div class="filter-box">
            <div class="filter-group">
                <label>From Date:</label>
                <input type="date" id="startDate">
            </div>
            <div class="filter-group">
                <label>To Date:</label>
                <input type="date" id="endDate">
            </div>
            <button onclick="applyFilters()">Apply Filter</button>
            <button style="background:#6c757d;" onclick="resetFilters()">Show All</button>
        </div>

        <h3>Records Found: <span id="count">0</span></h3>
        <div style="max-height: 600px; overflow-y: auto;">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Student Name</th>
                        <th>Index Number</th>
                    </tr>
                </thead>
                <tbody id="attendanceList"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
        authDomain: "qr-code-attendace.firebaseapp.com",
        projectId: "qr-code-attendace",
        storageBucket: "qr-code-attendace.firebasestorage.app",
        messagingSenderId: "346712215800",
        appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let qrcode = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });
    let allData = [];

    // 1. Generate QR
    window.generateQR = () => {
        const cid = document.getElementById('classIdInput').value;
        const url = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
        qrcode.makeCode(url);
        fetchData(cid);
    };

    // 2. Fetch Data (Real-time)
    function fetchData(cid) {
        const q = query(collection(db, "attendance"), where("classId", "==", cid));
        
        onSnapshot(q, (snap) => {
            allData = snap.docs.map(doc => ({
                id: doc.id,
                ...doc.data(),
                dateObj: doc.data().timestamp ? doc.data().timestamp.toDate() : new Date()
            }));
            // Sort by newest first
            allData.sort((a, b) => b.dateObj - a.dateObj);
            renderTable(allData);
        });
    }

    // 3. Render Table
    function renderTable(data) {
        const listBody = document.getElementById('attendanceList');
        document.getElementById('count').innerText = data.length;
        
        listBody.innerHTML = data.map(d => `
            <tr>
                <td>${d.dateObj.toLocaleDateString()}</td>
                <td>${d.dateObj.toLocaleTimeString()}</td>
                <td>${d.student}</td>
                <td>${d.index}</td>
            </tr>
        `).join('');
    }

    // 4. Filtering Logic
    window.applyFilters = () => {
        const start = new Date(document.getElementById('startDate').value);
        const end = new Date(document.getElementById('endDate').value);
        end.setHours(23, 59, 59); // Include the whole end day

        if (isNaN(start) || isNaN(end)) return alert("Please select both dates");

        const filtered = allData.filter(d => d.dateObj >= start && d.dateObj <= end);
        renderTable(filtered);
    };

    window.resetFilters = () => {
        document.getElementById('startDate').value = "";
        document.getElementById('endDate').value = "";
        renderTable(allData);
    };

    // 5. Download CSV
    window.downloadSheet = () => {
        const cid = document.getElementById('classIdInput').value;
        const rows = document.querySelectorAll("#attendanceTable tr");
        let csvContent = "data:text/csv;charset=utf-8,Date,Time,Name,Index\n";

        rows.forEach((row, index) => {
            if (index > 0) {
                const cols = row.querySelectorAll("td");
                const rowData = Array.from(cols).map(col => col.innerText).join(",");
                csvContent += rowData + "\n";
            }
        });

        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `Attendance_${cid}_Semester_Report.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    window.updateLocation = () => {
        const cid = document.getElementById('classIdInput').value;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await updateDoc(doc(db, "classes", cid), {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            });
            alert("Location updated for this class!");
        });
    };

    generateQR();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; display: flex; }
        .sidebar { width: 280px; background: white; height: 100vh; padding: 20px; border-right: 1px solid #ddd; position: fixed; box-sizing: border-box; }
        .main { margin-left: 280px; padding: 30px; flex-grow: 1; }
        .qr-box { text-align: center; margin: 20px 0; padding: 10px; border: 1px solid #ddd; background: #fafafa; }
        #qrImage { width: 180px; height: 180px; display: block; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; color: white; }
        .btn-gray { background: #6c757d; }
        .btn-green { background: #28a745; }
        .btn-orange { background: #fd7e14; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .stats { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #007bff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Controls</h3>
        <label>Class ID:</label>
        <input type="text" id="classIdInput" value="cs101" onchange="refresh()">
        
        <div class="qr-box">
            <img id="qrImage" src="" alt="QR Code">
        </div>

        <button class="btn-gray" onclick="updateLoc()">📍 Set Room GPS</button>
        
        <hr style="margin: 20px 0;">
        
        <button class="btn-green" onclick="downloadCSV()">📊 Download CSV</button>
        <button class="btn-orange" onclick="copyToClipboard()">📋 Copy for Excel</button>
        <p style="font-size: 11px; color: #666; text-align: center; margin-top: 5px;">Use "Copy" if Download fails</p>
    </div>

    <div class="main">
        <div class="stats">Total Present: <span id="count">0</span></div>
        
        <label>Filter by Date:</label>
        <input type="date" id="viewDate" style="width: 200px;" onchange="refresh()">

        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Student Name</th>
                    <th>Index Number</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",

        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('viewDate').value = new Date().toISOString().split('T')[0];

        window.refresh = () => {
            const cid = document.getElementById('classIdInput').value;
            const url = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`;
            load(cid);
        };

        let unsub = null;
        function load(cid) {
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "attendance"), where("classId", "==", cid)), (snap) => {
                const selectedDate = document.getElementById('viewDate').value;
                const filtered = snap.docs.map(d => d.data()).filter(d => {
                    if(!d.timestamp) return false;
                    return d.timestamp.toDate().toISOString().split('T')[0] === selectedDate;
                }).sort((a,b) => b.timestamp - a.timestamp);

                document.getElementById('count').innerText = filtered.length;
                document.getElementById('list').innerHTML = filtered.map(d => `
                    <tr>
                        <td>${d.timestamp.toDate().toLocaleTimeString()}</td>
                        <td>${d.student}</td>
                        <td>${d.index}</td>
                    </tr>
                `).join('') || "<tr><td colspan='3' style='text-align:center;'>No records.</td></tr>";
            });
        }

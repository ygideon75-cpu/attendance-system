<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --success: #28a745;
            --warning: #fd7e14;
            --bg: #f0f4f8; /* New soft blue-gray background */
            --sidebar: #ffffff;
            --card: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
            box-shadow: 4px 0 10px rgba(0,0,0,0.03);
            z-index: 10;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0 0 2rem;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .control-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.9rem;
            box-sizing: border-box;
            background: #f8fafc;
        }

        .qr-card {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        #qrImage {
            width: 160px;
            height: 160px;
            border-radius: 4px;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.6rem;
        }

        .btn-blue { background: var(--primary); color: white; }
        .btn-blue:hover { background: var(--primary-dark); transform: translateY(-1px); }
        
        .btn-gray { background: #f1f5f9; color: #475569; border: 1px solid var(--border); }
        .btn-gray:hover { background: #e2e8f0; }

        .btn-green { background: var(--success); color: white; margin-top: 1rem; }
        .btn-orange { background: var(--warning); color: white; }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 2.5rem;
            flex-grow: 1;
        }

        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            flex: 1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .stat-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-top: 5px; }

        /* Table */
        .table-container {
            background: var(--card);
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 1.2rem 1rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 1.2rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        tr:hover { background-color: #f8fafc; }
        
        .time-text { color: var(--primary); font-weight: 600; font-family: 'Courier New', Courier, monospace; background: #eef2ff; padding: 4px 8px; border-radius: 4px; }
        .index-text { background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; color: #475569; border: 1px solid #e2e8f0; }
        .student-name { font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1>Attendance Dashboard</h1>
        
        <div class="control-group">
            <label>Current Class ID</label>
            <input type="text" id="classIdInput" value="cs101" onchange="refresh()">
        </div>

        <div class="qr-card">
            <img id="qrImage" src="" alt="QR Code">
            <p style="font-size: 0.65rem; color: var(--text-muted); margin-top: 10px; font-weight: 700;">SCAN TO MARK PRESENT</p>
        </div>

        <button class="btn-gray" onclick="updateLoc()">📍 Update Room GPS</button>
        
        <div style="margin-top: auto;">
            <button class="btn-green" onclick="downloadExcel()">📥 Download CSV</button>
            <button class="btn-orange" onclick="copyTable()">📋 Copy for Excel</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Students Present</div>
                <div class="stat-value" id="count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Filter By Date</div>
                <input type="date" id="viewDate" onchange="refresh()" style="margin-top: 0.5rem; border: 1px solid var(--border); padding: 8px; border-radius: 6px; width: 100%; font-family: inherit; font-weight: 600; color: var(--primary);">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Arrival Time</th>
                        <th>Student Name</th>
                        <th>Index Number</th>
                    </tr>
                </thead>
                <tbody id="list">
                    <!-- Data will appear here -->
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('viewDate').value = new Date().toISOString().split('T')[0];

        window.refresh = () => {
            const cid = document.getElementById('classIdInput').value;
            const url = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}`;
            load(cid);
        };

        let unsub = null;
        function load(cid) {
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "attendance"), where("classId", "==", cid)), (snap) => {
                const selectedDate = document.getElementById('viewDate').value;
                const filtered = snap.docs.map(d => d.data()).filter(d => {
                    if(!d.timestamp) return false;
                    return d.timestamp.toDate().toISOString().split('T')[0] === selectedDate;
                }).sort((a,b) => b.timestamp - a.timestamp);

                document.getElementById('count').innerText = filtered.length;
                document.getElementById('list').innerHTML = filtered.map(d => {
                    const time = d.timestamp.toDate().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    return `<tr>
                        <td><span class="time-text">${time}</span></td>
                        <td class="student-name">${d.student}</td>
                        <td><span class="index-text">${d.index}</span></td>
                    </tr>`;
                }).join('') || "<tr><td colspan='3' style='text-align:center; padding: 4rem; color: var(--text-muted);'>No records found for this date.</td></tr>";
            });
        }

        window.downloadExcel = () => {
            let csv = "\ufeffTime,Name,Index\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                if (tr.cells.length >= 3) {
                    csv += `${tr.cells[0].innerText},${tr.cells[1].innerText.replace(/,/g, "")},${tr.cells[2].innerText}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", "report.csv");
            document.body.appendChild(link);
            link.click();
        };

        window.copyTable = () => {
            let text = "Time\tName\tIndex\n";
            document.querySelectorAll("#list tr").forEach(tr => {
                if (tr.cells.length >= 3) {
                    text += `${tr.cells[0].innerText}\t${tr.cells[1].innerText}\t${tr.cells[2].innerText}\n`;
                }
            });
            navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard! Paste into Excel (Ctrl+V)."));
        };

        window.updateLoc = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await updateDoc(doc(db, "classes", document.getElementById('classIdInput').value), { lat: pos.coords.latitude, lng: pos.coords.longitude });
                alert("Room GPS Updated!");
            });
        };

        refresh();
    </script>
</body>
</html>

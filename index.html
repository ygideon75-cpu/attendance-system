<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); text-align: center; width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .success-msg { color: #28a745; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2 id="className">Connecting...</h2>
        <p>Please enter your details for today's class.</p>
        
        <input type="text" id="studentName" placeholder="Full Name">
        <input type="text" id="studentIndex" placeholder="Index Number">

        <div id="status">Detecting Location...</div>
        
        <button id="submitBtn" disabled onclick="submitAttendance()">Mark Present</button>
        <div id="successMsg" class="success-msg">✅ Attendance Marked Successfully!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('class') || "cs101"; 
        let classData = null;

        // 1. Load Class Data
        async function init() {
            try {
                const docRef = doc(db, "classes", classId);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    classData = snap.data();
                    document.getElementById('className').innerText = classData.name;
                    checkLocation();
                } else {
                    document.getElementById('status').innerText = "Error: Class ID not found.";
                }
            } catch (e) { alert("Error: " + e.message); }
        }

        // 2. GPS Logic
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.checkLocation = () => {
            navigator.geolocation.watchPosition((pos) => {
                if(!classData) return;
                const d = getDistance(pos.coords.latitude, pos.coords.longitude, classData.lat, classData.lng);
                if (d <= classData.radius) {
                    document.getElementById('status').innerText = "Location Verified ✅";
                    document.getElementById('status').style.color = "green";
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    document.getElementById('status').innerText = "Too far from class!";
                    document.getElementById('status').style.color = "red";
                    document.getElementById('submitBtn').disabled = true;
                }
            }, null, {enableHighAccuracy: true});
        };

        // 3. Submit Attendance
        window.submitAttendance = async () => {
            const name = document.getElementById('studentName').value;
            const index = document.getElementById('studentIndex').value;
            if(!name || !index) return alert("Please enter Name and Index");

            try {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerText = "Saving...";

                await addDoc(collection(db, "attendance"), {
                    student: name,
                    index: index,
                    classId: classId,
                    timestamp: serverTimestamp()
                });

                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('status').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                alert("Success! Your attendance is recorded.");
            } catch (e) {
                alert("Error: " + e.message);
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = "Mark Present";
            }
        };

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.4s ease;
        }

        .icon-header {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            font-size: 1.8rem;
            color: white;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            letter-spacing: -0.025em;
        }

        .class-info {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-field {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .input-field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
            background: #fdfdfd;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }

        /* The Status Pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 700;
            margin: 1.5rem 0;
            background: #f1f5f9;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .status-pill.verified {
            background: #dcfce7;
            color: #15803d;
        }

        .status-pill.error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        .success-state {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="mainCard">
            <!-- Form State -->
            <div id="formUI">
                <div class="icon-header">📍</div>
                <h2 id="className">Connecting...</h2>
                <div class="class-info">Please verify location to proceed</div>
                
                <div class="input-field">
                    <label>Full Name</label>
                    <input type="text" id="studentName" placeholder="Enter your name">
                </div>

                <div class="input-field">
                    <label>Index Number</label>
                    <input type="text" id="studentIndex" placeholder="Enter index number">
                </div>

                <div id="statusPill" class="status-pill">
                    <div class="pulse"></div>
                    <span id="statusText">Initializing GPS...</span>
                </div>

                <button id="submitBtn" disabled onclick="submitAttendance()">Mark Present</button>
            </div>

            <!-- Success State -->
            <div id="successUI" class="success-state">
                <div class="icon-header" style="background: var(--success);">✓</div>
                <h2>Check-in Successful!</h2>
                <p class="class-info">Your attendance has been recorded for today. You may close this window.</p>
                <button onclick="location.reload()" style="background: #f1f5f9; color: #475569; margin-top: 1rem;">Back to Home</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('class') || "cs101"; 
        let classData = null;

        async function init() {
            try {
                const docRef = doc(db, "classes", classId);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    classData = snap.data();
                    document.getElementById('className').innerText = classData.name;
                    startGPS();
                } else {
                    updateStatus("Class not found", "error");
                }
            } catch (e) { updateStatus("Connection Error", "error"); }
        }

        function updateStatus(text, type) {
            const pill = document.getElementById('statusPill');
            const txt = document.getElementById('statusText');
            pill.className = "status-pill " + (type || "");
            txt.innerText = text;
        }

        function startGPS() {
            updateStatus("Searching for GPS...", "");
            navigator.geolocation.watchPosition((pos) => {
                if(!classData) return;
                const d = calculateDistance(pos.coords.latitude, pos.coords.longitude, classData.lat, classData.lng);
                
                if (d <= classData.radius) {
                    updateStatus("In Range ✅", "verified");
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    updateStatus(`Too far (${Math.round(d)}m)`, "error");
                    document.getElementById('submitBtn').disabled = true;
                }
            }, (err) => {
                updateStatus("Enable Location Access", "error");
            }, {enableHighAccuracy: true});
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.submitAttendance = async () => {
            const name = document.getElementById('studentName').value.trim();
            const index = document.getElementById('studentIndex').value.trim();
            if(!name || !index) return alert("Please fill in all fields");

            const today = new Date().toISOString().split('T')[0];
            const lockID = `${today}_${classId}_${index}`;

            try {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerText = "Verifying...";

                // Once-per-day check
                const lockRef = doc(db, "locks", lockID);
                const lockSnap = await getDoc(lockRef);

                if (lockSnap.exists()) {
                    alert("You have already marked attendance for today!");
                    location.reload();
                    return;
                }

                await setDoc(lockRef, { used: true });
                await addDoc(collection(db, "attendance"), {
                    student: name,
                    index: index,
                    classId: classId,
                    timestamp: serverTimestamp()
                });

                document.getElementById('formUI').style.display = 'none';
                document.getElementById('successUI').style.display = 'block';
            } catch (e) {
                alert("Error: " + e.message);
                document.getElementById('submitBtn').disabled = false;
            }
        };

        init();
    </script>
</body>
</html>

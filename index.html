<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="className">Loading class...</h2>
        <input type="text" id="studentName" placeholder="Enter Your Full Name">
        <div id="status">Detecting location...</div>
        <button id="submitBtn" disabled onclick="submitAttendance()">Mark Present</button>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. REPLACE THIS WITH YOUR CONFIG FROM PHASE 1
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. Logic to get Class ID from URL (e.g., index.html?class=CS101)
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('class') || "CS101"; 

        let classData = null;

        // 3. Haversine Formula to calculate distance in meters
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 4. Fetch Class Info and Verify Location
        async function init() {
            const docRef = doc(db, "classes", classId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                classData = docSnap.data();
                document.getElementById('className').innerText = classData.name;
                checkLocation();
            } else {
                document.getElementById('status').innerText = "Invalid Class QR Code.";
            }
        }

        function checkLocation() {
            if (!navigator.geolocation) {
                document.getElementById('status').innerText = "Geolocation not supported.";
                return;
            }

            navigator.geolocation.getCurrentPosition((position) => {
                const dist = calculateDistance(
                    position.coords.latitude, 
                    position.coords.longitude, 
                    classData.lat, 
                    classData.lng
                );

                if (dist <= classData.radius) {
                    document.getElementById('status').innerText = "Location Verified ✅";
                    document.getElementById('status').style.color = "green";
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    document.getElementById('status').innerText = `Too far away! (${Math.round(dist)}m away)`;
                    document.getElementById('status').style.color = "red";
                }
            }, (error) => {
                document.getElementById('status').innerText = "Please enable GPS/Location.";
            });
        }

        // 5. Submit to Firestore
        window.submitAttendance = async () => {
            const name = document.getElementById('studentName').value;
            if(!name) return alert("Enter your name");

            await addDoc(collection(db, "attendance"), {
                student: name,
                classId: classId,
                timestamp: serverTimestamp()
            });

            alert("Attendance Marked Successfully!");
            document.getElementById('submitBtn').disabled = true;
        };

        init();
    </script>
</body>
</html>

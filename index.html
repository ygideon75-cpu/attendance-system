<!-- ... (Keep the same CSS as before) ... -->
<div class="card">
    <h2 id="className">Loading class...</h2>
    
    <!-- This section shows only if student is NOT remembered -->
    <div id="registrationForm">
        <input type="text" id="studentName" placeholder="Full Name">
        <input type="text" id="studentIndex" placeholder="Index Number">
    </div>

    <!-- This section shows if student IS remembered -->
    <div id="welcomeBack" style="display:none;">
        <p>Welcome back, <br><strong id="displayName"></strong></p>
        <button onclick="clearIdentity()" style="background:#dc3545; padding:5px; font-size:12px; width:auto;">Not you?</button>
    </div>
    
    <div id="status">Waiting for location...</div>
    <button id="submitBtn" disabled onclick="submitAttendance()">Mark Present</button>

    <div class="debug-box">
        Your Lat: <span id="myLat">0</span> | Your Lng: <span id="myLng">0</span><br>
        Dist: <span id="myDist">0</span>m
    </div>
</div>

<script type="module">
    // ... (Keep Firebase Imports and Config) ...

    const nameInput = document.getElementById('studentName');
    const indexInput = document.getElementById('studentIndex');
    const welcomeDiv = document.getElementById('welcomeBack');
    const formDiv = document.getElementById('registrationForm');
    const displaySpan = document.getElementById('displayName');

    // CHECK IF STUDENT IS REMEMBERED
    function checkIdentity() {
        const savedName = localStorage.getItem('studentName');
        const savedIndex = localStorage.getItem('studentIndex');

        if (savedName && savedIndex) {
            formDiv.style.display = 'none';
            welcomeDiv.style.display = 'block';
            displaySpan.innerText = savedName + " (" + savedIndex + ")";
            nameInput.value = savedName;
            indexInput.value = savedIndex;
        }
    }

    window.clearIdentity = () => {
        localStorage.clear();
        location.reload();
    };

    // Update submitAttendance to save identity
    window.submitAttendance = async () => {
        const name = nameInput.value;
        const index = indexInput.value;
        if(!name || !index) return alert("Please enter Name and Index");

        try {
            await addDoc(collection(db, "attendance"), {
                student: name,
                indexNumber: index,
                classId: classId,
                timestamp: serverTimestamp()
            });

            // SAVE TO PHONE MEMORY
            localStorage.setItem('studentName', name);
            localStorage.setItem('studentIndex', index);

            alert("Success! Attendance marked.");
            document.getElementById('submitBtn').disabled = true;
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    checkIdentity();
    init(); // Run the location logic
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); text-align: center; width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .debug { margin-top: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #eee; border-radius: 5px; font-size: 12px; color: #777; text-align: left; }
        .welcome-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #c2d7fa; }
        .forget-link { color: #d93025; font-size: 12px; cursor: pointer; text-decoration: underline; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="className">Connecting...</h2>
        
        <!-- Form for new students -->
        <div id="regForm">
            <p>Enter your details to register</p>
            <input type="text" id="studentName" placeholder="Full Name">
            <input type="text" id="studentIndex" placeholder="Index Number">
        </div>

        <!-- Welcome for returning students -->
        <div id="welcomeMsg" style="display:none;" class="welcome-box">
            <span>Welcome back,</span><br>
            <strong id="userDisplay" style="font-size: 18px;"></strong>
            <span class="forget-link" onclick="forgetMe()">Not you? Reset details</span>
        </div>

        <div id="status">Detecting Location...</div>
        
        <button id="submitBtn" disabled onclick="submitAttendance()">Mark Present</button>

        <div class="debug">
            <strong>GPS Status:</strong><br>
            Lat: <span id="lat">0</span> | Lng: <span id="lng">0</span><br>
            Distance: <span id="dist">0</span>m
        </div>
        <button onclick="checkLocation()" style="background:#6c757d; padding:5px; font-size:12px; width:auto; margin-top:10px;">Refresh GPS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('class') || "cs101"; 
        let classData = null;

        // 1. Check if student is already known
        function loadIdentity() {
            const savedName = localStorage.getItem('student_name');
            const savedIndex = localStorage.getItem('student_index');
            
            if(savedName && savedIndex) {
                document.getElementById('regForm').style.display = 'none';
                document.getElementById('welcomeMsg').style.display = 'block';
                document.getElementById('userDisplay').innerText = savedName;
                // Fill hidden inputs for submission
                document.getElementById('studentName').value = savedName;
                document.getElementById('studentIndex').value = savedIndex;
            }
        }

        window.forgetMe = () => {
            if(confirm("This will clear your saved name and index. Continue?")) {
                localStorage.clear();
                location.reload();
            }
        };

        // 2. Distance Calculator
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 3. Load Class Data
        async function init() {
            try {
                const docRef = doc(db, "classes", classId);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    classData = snap.data();
                    document.getElementById('className').innerText = classData.name;
                    checkLocation();
                } else {
                    document.getElementById('status').innerText = "Error: Class ID not found.";
                }
            } catch (e) {
                alert("Connection Error: " + e.message);
            }
        }

        // 4. GPS Logic
        window.checkLocation = () => {
            if (!navigator.geolocation) return alert("GPS not supported");
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const uLat = pos.coords.latitude;
                const uLng = pos.coords.longitude;
                document.getElementById('lat').innerText = uLat.toFixed(5);
                document.getElementById('lng').innerText = uLng.toFixed(5);

                if(!classData) return;

                const d = getDistance(uLat, uLng, classData.lat, classData.lng);
                document.getElementById('dist').innerText = Math.round(d);

                if (d <= classData.radius) {
                    document.getElementById('status').innerText = "Location Verified ✅";
                    document.getElementById('status').style.color = "green";
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    document.getElementById('status').innerText = "Too far from class!";
                    document.getElementById('status').style.color = "red";
                    document.getElementById('submitBtn').disabled = true;
                }
            }, (err) => {
                document.getElementById('status').innerText = "GPS Error: Please enable location.";
            }, {enableHighAccuracy: true});
        };

        // 5. Submit Attendance
        window.submitAttendance = async () => {
            const name = document.getElementById('studentName').value;
            const index = document.getElementById('studentIndex').value;
            
            if(!name || !index) return alert("Please enter your Name and Index Number");

            try {
                document.getElementById('submitBtn').innerText = "Saving...";
                await addDoc(collection(db, "attendance"), {
                    student: name,
                    index: index,
                    classId: classId,
                    timestamp: serverTimestamp()
                });

                // SAVE TO PHONE MEMORY
                localStorage.setItem('student_name', name);
                localStorage.setItem('student_index', index);

                alert("Success! Attendance marked for " + name);
                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('status').innerText = "Attendance Recorded! You can close this page.";
            } catch (e) {
                alert("Error: " + e.message);
                document.getElementById('submitBtn').innerText = "Mark Present";
            }
        };

        loadIdentity();
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; color: #1e293b; }
        .sidebar { width: 320px; background: white; height: 100vh; border-right: 1px solid #e2e8f0; padding: 2rem; box-sizing: border-box; position: fixed; }
        .main { margin-left: 320px; padding: 2rem; width: 100%; }
        h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 1.5rem; color: #111827; }
        .qr-card { text-align: center; background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin-bottom: 1.5rem; }
        #qrImage { width: 180px; height: 180px; border-radius: 0.5rem; border: 4px solid white; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; }
        button { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: none; font-weight: 700; cursor: pointer; margin-bottom: 0.5rem; }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        .btn-success { background: #10b981; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 1rem; overflow: hidden; border: 1px solid #e2e8f0; }
        th { background: #f8fafc; text-align: left; padding: 1rem; font-size: 0.875rem; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 1rem; font-size: 0.95rem; border-bottom: 1px solid #f1f5f9; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Admin Panel</h1>
        <label>Class ID</label>
        <input type="text" id="classIdInput" value="cs101" onchange="refreshDashboard()">
        <div class="qr-card">
            <img id="qrImage" src="" alt="QR Code">
        </div>
        <button class="btn-secondary" onclick="updateLocation()">📍 Update Room GPS</button>
        <button class="btn-success" onclick="downloadCSV()">📊 Export to Excel</button>
    </div>

    <div class="main">
        <div class="stats-grid">
            <div class="stat-card">
                <label>Present Today</label>
                <div class="stat-val" id="count">0</div>
            </div>
            <div class="stat-card">
                <label>Select Date</label>
                <input type="date" id="viewDate" onchange="refreshDashboard()" style="margin:0; margin-top:0.5rem;">
            </div>
        </div>
        <table>
            <thead>
                <tr><th>Time</th><th>Student Name</th><th>Index Number</th></tr>
            </thead>
            <tbody id="attendanceList"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6TqpzjJNSJ5d2CCJl7WL4RrmyIvTk8DA",
            authDomain: "qr-code-attendace.firebaseapp.com",
            projectId: "qr-code-attendace",
            storageBucket: "qr-code-attendace.firebasestorage.app",
            messagingSenderId: "346712215800",
            appId: "1:346712215800:web:0e2127df0ee4e2049c6b0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const now = new Date();
        const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        document.getElementById('viewDate').value = todayStr;

        window.refreshDashboard = () => {
            const cid = document.getElementById('classIdInput').value;
            const studentUrl = `https://ygideon75-cpu.github.io/attendance-system/?class=${cid}`;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(studentUrl)}`;
            listenForAttendance(cid);
        };

        let unsub = null;
        function listenForAttendance(cid) {
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "attendance"), where("classId", "==", cid)), (snap) => {
                const selectedDate = document.getElementById('viewDate').value;
                const filtered = snap.docs.map(d => d.data()).filter(d => {
                    if(!d.timestamp) return false;
                    const date = d.timestamp.toDate();
                    return (date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0')) === selectedDate;
                }).sort((a,b) => b.timestamp - a.timestamp);

                document.getElementById('count').innerText = filtered.length;
                document.getElementById('attendanceList').innerHTML = filtered.map(d => `
                    <tr>
                        <td>${d.timestamp.toDate().toLocaleTimeString()}</td>
                        <td>${d.student}</td>
                        <td>${d.index}</td>
                    </tr>
                `).join('') || '<tr><td colspan="3" style="text-align:center; padding:2rem;">No records for this date.</td></tr>';
            });
        }

        window.downloadCSV = () => {
            let csv = "Time,Name,Index\n";
            document.querySelectorAll("#attendanceList tr").forEach(row => {
                if(row.cells.length === 3) csv += `"${row.cells[0].innerText}","${row.cells[1].innerText}","${row.cells[2].innerText}"\n`;
            });
            const link = document.createElement("a");
            link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
            link.download = `Attendance_${document.getElementById('classIdInput').value}.csv`;
            link.click();
        };

        window.updateLocation = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await updateDoc(doc(db, "classes", document.getElementById('classIdInput').value), { lat: pos.coords.latitude, lng: pos.coords.longitude });
                alert("Location Updated!");
            });
        };

        refreshDashboard();
    </script>
</body>
</html>
